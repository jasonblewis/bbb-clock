# Create /run/clock/ at boot (tmpfs, no SD-card writes) so clock.c can expose
# its internal state as one-value-per-file (e.g. /run/clock/brightness), read by
# the telemetry service. See ADR 0003 / issue #8.
#
# Install to /etc/tmpfiles.d/bbb-clock.conf, then either reboot or run:
#   systemd-tmpfiles --create /etc/tmpfiles.d/bbb-clock.conf
#
# systemd-tmpfiles-setup.service runs before multi-user.target, so /run/clock
# exists before clock.service starts.
#
# Type Path        Mode UID  GID  Age Argument
d      /run/clock  0755 root root -   -
